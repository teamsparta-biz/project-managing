<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>교육 프로젝트 진행 현황</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/3.3.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script>
  // 페이지 깜빡임 방지를 위한 즉시 실행 테마 적용
  (function() {
    try {
      var saved = localStorage.getItem('training_matrix_theme');
      var theme = (saved === 'light' || saved === 'dark') ? saved : 'auto';
      document.documentElement.setAttribute('data-theme', theme);
    } catch(e) {
      document.documentElement.setAttribute('data-theme', 'auto');
    }
  })();
</script>
<style>
:root, html[data-theme="light"] {
  --bg-primary: #ffffff;
  --bg-secondary: #f7f6f5;
  --bg-tertiary: #eeeceb;
  --text-primary: #1a1a1a;
  --text-secondary: #5a5a5a;
  --text-tertiary: #8a8a8a;
  --text-danger: #C8192E;
  --border-tertiary: rgba(0,0,0,0.1);
  --border-secondary: rgba(0,0,0,0.18);
  --border-primary: rgba(0,0,0,0.3);
  --radius-md: 8px;
  --radius-lg: 12px;
  --font-sans: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo", "Segoe UI", system-ui, sans-serif;
  --color-status-progress: #BA7517;
  --color-status-done: #2E7D4F;
  --color-section-before: #C8192E;
  --color-section-after: #1A1A1A;
  --color-d-soon: #BA7517;
  --color-d-over: #C8192E;
  --color-d-dday: #8B1520;
}
html[data-theme="dark"] {
  --bg-primary: #1a1a1a;
  --bg-secondary: #252525;
  --bg-tertiary: #303030;
  --text-primary: #f4f2ed;
  --text-secondary: #b4b2a9;
  --text-tertiary: #888780;
  --text-danger: #FF4D5E;
  --border-tertiary: rgba(255,255,255,0.12);
  --border-secondary: rgba(255,255,255,0.22);
  --border-primary: rgba(255,255,255,0.4);
  --color-status-progress: #EF9F27;
  --color-status-done: #97C459;
  --color-section-before: #FF4D5E;
  --color-section-after: #C8C8C8;
  --color-d-soon: #EF9F27;
  --color-d-over: #FF4D5E;
  --color-d-dday: #FAC775;
}
@media (prefers-color-scheme: dark) {
  html[data-theme="auto"] {
    --bg-primary: #1a1a1a;
    --bg-secondary: #252525;
    --bg-tertiary: #303030;
    --text-primary: #f4f2ed;
    --text-secondary: #b4b2a9;
    --text-tertiary: #888780;
    --text-danger: #FF4D5E;
    --border-tertiary: rgba(255,255,255,0.12);
    --border-secondary: rgba(255,255,255,0.22);
    --border-primary: rgba(255,255,255,0.4);
    --color-status-progress: #EF9F27;
    --color-status-done: #97C459;
    --color-section-before: #FF4D5E;
    --color-section-after: #C8C8C8;
    --color-d-soon: #EF9F27;
    --color-d-over: #FF4D5E;
    --color-d-dday: #FAC775;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); background: var(--bg-primary); color: var(--text-primary); padding: 32px 28px; min-height: 100vh; }
.container { max-width: 1280px; margin: 0 auto; }
.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }

.title-bar { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 28px; gap: 16px; flex-wrap: wrap; padding: 0 4px; }
.title-bar h1 { font-size: 22px; font-weight: 500; color: var(--text-primary); line-height: 1.4; padding: 4px 0; }
.sync-btn { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; font-size: 13px; font-family: var(--font-sans); font-weight: 500; border: 1px solid var(--color-section-before); color: var(--color-section-before); background: color-mix(in srgb, var(--color-section-before) 10%, transparent); border-radius: var(--radius-md); cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
.sync-btn:hover { opacity: 0.75; }
.summary { font-size: 13px; color: var(--text-secondary); padding: 4px 0; }
.summary strong { font-weight: 500; color: var(--text-primary); }

.save-indicator { font-size: 12px; color: var(--color-status-done); display: inline-flex; align-items: center; gap: 4px; padding: 3px 9px; background: color-mix(in srgb, var(--color-status-done) 14%, transparent); border-radius: 999px; opacity: 0; transform: translateY(-2px); transition: opacity 0.2s, transform 0.2s; pointer-events: none; }
.save-indicator.visible { opacity: 1; transform: translateY(0); }
.save-indicator.error { color: var(--text-danger); background: color-mix(in srgb, var(--text-danger) 14%, transparent); }
.save-indicator i { font-size: 13px; }
.user-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 12px; font-size: 12px; font-family: var(--font-sans); font-weight: 500; background: var(--bg-tertiary); color: var(--text-secondary); border: 1px solid var(--border-secondary); border-radius: 999px; cursor: pointer; }
.user-badge:hover { background: var(--bg-secondary); color: var(--text-primary); }
.user-badge i { font-size: 13px; }

.toolbar { display: flex; gap: 8px; margin-bottom: 20px; align-items: center; flex-wrap: wrap; padding: 14px 16px; background: var(--bg-secondary); border-radius: var(--radius-md); border: 1px solid var(--border-tertiary); }
.toolbar input { flex: 1; min-width: 200px; padding: 8px 12px; font-size: 13px; border: 1px solid var(--border-secondary); border-radius: var(--radius-md); background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-sans); outline: none; }
.toolbar input:focus { border-color: var(--border-primary); }
.toolbar button { padding: 8px 14px; font-size: 13px; border: 1px solid var(--border-secondary); border-radius: var(--radius-md); background: var(--bg-primary); color: var(--text-primary); cursor: pointer; font-family: var(--font-sans); display: inline-flex; align-items: center; gap: 6px; font-weight: 400; }
.toolbar button:hover { background: var(--bg-tertiary); }
.toolbar button.primary { background: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary); }
.toolbar button.primary:hover { opacity: 0.88; }

.theme-toggle { display: inline-flex; border: 1px solid var(--border-secondary); border-radius: var(--radius-md); overflow: hidden; background: var(--bg-primary); }
.theme-btn { padding: 7px 11px !important; border: none !important; border-radius: 0 !important; background: transparent !important; color: var(--text-tertiary) !important; cursor: pointer; font-size: 14px; line-height: 1; }
.theme-btn:not(:last-child) { border-right: 1px solid var(--border-tertiary) !important; }
.theme-btn:hover { background: var(--bg-secondary) !important; color: var(--text-secondary) !important; }
.theme-btn.active { background: var(--text-primary) !important; color: var(--bg-primary) !important; }
.theme-btn i { font-size: 16px; }

.tabs { display: flex; gap: 4px; margin-bottom: 18px; border-bottom: 1px solid var(--border-secondary); padding: 0 4px; }
.tab { padding: 10px 18px; font-size: 14px; font-weight: 500; color: var(--text-tertiary); cursor: pointer; border: none; background: transparent; font-family: var(--font-sans); border-bottom: 2px solid transparent; margin-bottom: -1px; display: inline-flex; align-items: center; gap: 7px; transition: color 0.15s; }
.tab:hover { color: var(--text-secondary); }
.tab.active { color: var(--text-primary); border-bottom-color: var(--text-primary); }
.tab .count { font-size: 11px; font-weight: 500; background: var(--bg-tertiary); color: var(--text-secondary); padding: 1px 7px; border-radius: 999px; min-width: 20px; text-align: center; }
.tab.active .count { background: var(--text-primary); color: var(--bg-primary); }

.table-wrap { overflow-x: auto; border: 1px solid var(--border-secondary); border-radius: var(--radius-lg); background: var(--bg-primary); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { border: 1px solid var(--border-secondary); padding: 0; text-align: center; vertical-align: middle; }
thead th { background: var(--bg-secondary); font-weight: 500; color: var(--text-secondary); font-size: 11px; padding: 8px 6px; }

.section-head { font-size: 12px; padding: 8px 10px !important; font-weight: 500; letter-spacing: 0.2px; }
.section-edu-before { background: color-mix(in srgb, var(--color-section-before) 12%, transparent) !important; color: var(--color-section-before) !important; }
.section-edu-after { background: color-mix(in srgb, var(--color-section-after) 12%, transparent) !important; color: var(--color-section-after) !important; }

.row-name { text-align: left; padding: 14px 16px; min-width: 260px; max-width: 300px; background: var(--bg-primary); position: sticky; left: 0; z-index: 2; vertical-align: top; }
.row-name input.company-input { width: 100%; border: 1px solid transparent; background: transparent; font-weight: 500; font-size: 14px; color: var(--text-primary); font-family: var(--font-sans); outline: none; padding: 5px 7px; border-radius: 4px; margin-bottom: 6px; }
.row-name input.company-input:focus, .row-name input.company-input:hover { background: var(--bg-secondary); border-color: var(--border-tertiary); }

.task-cell { width: 54px; min-width: 54px; cursor: pointer; padding: 10px 4px; transition: background 0.15s; display: table-cell; }
.task-cell:hover { background: var(--bg-secondary); }
.cell-label { display: block; font-size: 10px; color: var(--text-tertiary); opacity: 0.6; margin-top: 5px; line-height: 1.3; word-break: keep-all; text-align: center; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
.task-th { min-width: 76px; max-width: 110px; vertical-align: top; padding-top: 8px !important; padding-bottom: 6px !important; cursor: grab; user-select: none; position: relative; }
.task-th:active { cursor: grabbing; }
.task-th.dragging { opacity: 0.35; cursor: grabbing; }
.task-th.drop-before::before { content: ''; position: absolute; left: -2px; top: 0; bottom: 0; width: 3px; background: var(--color-section-before); border-radius: 2px; z-index: 5; }
.task-th.drop-after::after { content: ''; position: absolute; right: -2px; top: 0; bottom: 0; width: 3px; background: var(--color-section-before); border-radius: 2px; z-index: 5; }
.task-th .drag-handle { position: absolute; top: 3px; left: 50%; transform: translateX(-50%); color: var(--text-tertiary); opacity: 0.4; font-size: 11px; line-height: 1; pointer-events: none; }
.task-th:hover .drag-handle { opacity: 0.9; }
.task-th-inner { font-size: 11px; color: var(--text-primary); line-height: 1.4; padding: 4px 6px 8px; word-break: keep-all; font-weight: 500; min-height: 36px; display: flex; align-items: center; justify-content: center; text-align: center; }
.task-th:hover .task-th-inner { color: var(--text-primary); }
.task-th:hover { background: var(--bg-secondary); }
.task-th-actions { display: flex; justify-content: center; gap: 4px; padding-top: 4px; border-top: 1px solid var(--border-tertiary); margin-top: 4px; }
.task-th-btn { background: transparent; border: none; cursor: pointer; padding: 3px 5px; color: var(--text-tertiary); font-size: 11px; border-radius: 3px; line-height: 1; }
.task-th-btn:hover { background: var(--bg-primary); color: var(--text-primary); }
.task-th-btn-del:hover { color: var(--text-danger); background: color-mix(in srgb, var(--text-danger) 12%, transparent); }
.add-task-th { min-width: 54px; }
.add-task-btn { background: transparent; border: 1px dashed var(--border-secondary); border-radius: var(--radius-md); padding: 9px 11px; color: var(--text-tertiary); cursor: pointer; font-size: 14px; font-family: var(--font-sans); line-height: 1; }
.add-task-btn:hover { color: var(--text-primary); border-color: var(--border-primary); background: var(--bg-primary); }

.check-icon { font-size: 19px; display: inline-block; line-height: 1; }
.status-0 .check-icon { color: var(--text-tertiary); opacity: 0.4; }
.status-1 .check-icon { color: var(--color-status-progress); }
.status-2 .check-icon { color: var(--color-status-done); }
.status-1 { background: color-mix(in srgb, var(--color-status-progress) 12%, transparent); }
.status-2 { background: color-mix(in srgb, var(--color-status-done) 12%, transparent); }

.action-footer { background: var(--bg-secondary); padding: 10px 14px; border-top: 1px solid var(--border-tertiary); }
.footer-layout { display: flex; gap: 16px; align-items: flex-start; }
.footer-left { display: flex; flex-direction: column; gap: 8px; min-width: 200px; flex-shrink: 0; }
.footer-sessions { flex: 1; min-width: 0; border-left: 1px solid var(--border-tertiary); padding-left: 16px; }
.progress-inline { display: flex; align-items: center; gap: 10px; }
.progress-num-inline { font-size: 13px; font-weight: 500; color: var(--text-primary); white-space: nowrap; display: flex; align-items: baseline; gap: 5px; }
.progress-num-inline .frac { color: var(--text-tertiary); font-weight: 400; font-size: 11px; }
.progress-inline .progress-bar { flex: 1; }
.action-btn-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; }
.row-name-actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border-tertiary); }
.progress-bar { height: 6px; background: var(--bg-primary); border-radius: 999px; overflow: hidden; border: 1px solid var(--border-tertiary); }
.progress-fill { height: 100%; border-radius: 999px; background: var(--color-status-done); transition: width 0.3s ease; }
.progress-fill.partial { background: linear-gradient(90deg, var(--color-status-done) var(--done), var(--color-status-progress) var(--done), var(--color-status-progress) calc(var(--done) + var(--partial))); }

.meta-row { display: flex; align-items: flex-start; gap: 6px; font-size: 12px; color: var(--text-secondary); margin-top: 6px; }
.meta-row i { font-size: 13px; color: var(--text-tertiary); flex-shrink: 0; margin-top: 3px; }
.meta-row input.date-input { border: 1px solid transparent; background: transparent; font-size: 12px; color: var(--text-primary); font-family: var(--font-sans); padding: 3px 6px; border-radius: 4px; outline: none; width: 130px; color-scheme: light dark; }
.meta-row input.date-input:hover, .meta-row input.date-input:focus { background: var(--bg-secondary); border-color: var(--border-tertiary); }
.meta-row .d-tag { font-size: 11px; font-weight: 500; padding: 1px 7px; border-radius: 999px; background: var(--bg-secondary); color: var(--text-tertiary); flex-shrink: 0; margin-top: 3px; border: 1px solid var(--border-tertiary); }
.meta-row .d-tag.soon { background: color-mix(in srgb, var(--color-d-soon) 15%, transparent); color: var(--color-d-soon); border-color: color-mix(in srgb, var(--color-d-soon) 30%, transparent); }
.meta-row .d-tag.over { background: color-mix(in srgb, var(--color-d-over) 15%, transparent); color: var(--color-d-over); border-color: color-mix(in srgb, var(--color-d-over) 30%, transparent); }
.meta-row .d-tag.dday { background: color-mix(in srgb, var(--color-d-dday) 18%, transparent); color: var(--color-d-dday); border-color: color-mix(in srgb, var(--color-d-dday) 35%, transparent); }
.meta-row textarea.memo-input { border: 1px solid transparent; background: transparent; font-size: 12px; color: var(--text-primary); font-family: var(--font-sans); padding: 4px 6px; border-radius: 4px; outline: none; flex: 1; resize: none; line-height: 1.5; min-height: 22px; }
.meta-row textarea.memo-input:hover, .meta-row textarea.memo-input:focus { background: var(--bg-secondary); border-color: var(--border-tertiary); }

.period-row { margin-top: 8px; padding: 8px 10px; background: var(--bg-secondary); border-radius: var(--radius-md); border: 1px solid var(--border-tertiary); }
.period-label { font-size: 11px; color: var(--text-tertiary); font-weight: 500; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 6px; letter-spacing: 0.2px; }
.period-label i { font-size: 12px; }
.period-inputs { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.datetime-input { border: 1px solid var(--border-tertiary); background: var(--bg-primary); font-size: 11px; color: var(--text-primary); font-family: var(--font-sans); padding: 4px 7px; border-radius: 4px; outline: none; color-scheme: light dark; min-width: 0; flex: 1; }
.datetime-input:hover { border-color: var(--border-secondary); }
.datetime-input:focus { border-color: var(--border-primary); }
.period-sep { color: var(--text-tertiary); font-size: 11px; flex-shrink: 0; }
.period-summary { margin-top: 6px; font-size: 11px; color: var(--text-secondary); display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.period-summary.partial { color: var(--text-tertiary); font-style: italic; }
.period-summary.error { color: var(--text-danger); font-weight: 500; }
.period-summary.error i { font-size: 13px; }
.period-duration { display: inline-flex; align-items: center; gap: 3px; }
.period-duration i { font-size: 12px; color: var(--text-tertiary); }
.period-status { font-size: 10px; font-weight: 500; padding: 1px 7px; border-radius: 999px; border: 1px solid; letter-spacing: 0.2px; }
.period-status.upcoming { color: var(--color-section-before); background: color-mix(in srgb, var(--color-section-before) 12%, transparent); border-color: color-mix(in srgb, var(--color-section-before) 30%, transparent); }
.period-status.ongoing { color: var(--color-status-progress); background: color-mix(in srgb, var(--color-status-progress) 15%, transparent); border-color: color-mix(in srgb, var(--color-status-progress) 35%, transparent); }
.period-status.finished { color: var(--color-status-done); background: color-mix(in srgb, var(--color-status-done) 12%, transparent); border-color: color-mix(in srgb, var(--color-status-done) 30%, transparent); }

.sessions-section { margin-top: 8px; }
.sessions-list { }
.sessions-list.scrollable { max-height: 260px; overflow-y: auto; padding-right: 2px; }
.sessions-list.scrollable::-webkit-scrollbar { width: 4px; }
.sessions-list.scrollable::-webkit-scrollbar-track { background: transparent; }
.sessions-list.scrollable::-webkit-scrollbar-thumb { background: var(--border-secondary); border-radius: 2px; }
.sessions-list.scrollable::-webkit-scrollbar-thumb:hover { background: var(--border-primary); }
.session-dates-multi { display: flex; flex-wrap: wrap; gap: 4px; }
.session-date-chip { font-size: 11px; background: var(--bg-tertiary); border: 1px solid var(--border-tertiary); border-radius: 4px; padding: 2px 6px; color: var(--text-secondary); white-space: nowrap; }
.sessions-label { font-size: 11px; color: var(--text-tertiary); font-weight: 500; display: flex; align-items: center; gap: 4px; margin-bottom: 6px; letter-spacing: 0.2px; }
.sessions-label i { font-size: 12px; }
.add-session-btn { margin-left: auto; background: transparent; border: 1px dashed var(--border-secondary); border-radius: 4px; padding: 2px 8px; color: var(--text-tertiary); cursor: pointer; font-size: 11px; font-family: var(--font-sans); line-height: 1.6; }
.add-session-btn:hover { color: var(--text-primary); border-color: var(--border-primary); }
.session-nav-ctrl { display: inline-flex; align-items: center; gap: 3px; margin-left: 4px; }
.session-nav-btn { background: transparent; border: 1px solid var(--border-tertiary); border-radius: 4px; padding: 1px 4px; color: var(--text-tertiary); cursor: pointer; font-size: 11px; line-height: 1; display: inline-flex; align-items: center; }
.session-nav-btn:hover:not(:disabled) { color: var(--text-primary); border-color: var(--border-secondary); background: var(--bg-primary); }
.session-nav-btn:disabled { opacity: 0.35; cursor: default; }
.session-nav-counter { font-size: 11px; color: var(--text-secondary); min-width: 28px; text-align: center; }
.session-row { padding: 8px 10px; background: var(--bg-secondary); border-radius: var(--radius-md); border: 1px solid var(--border-tertiary); margin-bottom: 6px; }
.session-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.session-num { font-size: 11px; font-weight: 600; color: var(--color-section-before); }
.remove-session-btn { background: transparent; border: none; cursor: pointer; padding: 2px 4px; color: var(--text-tertiary); font-size: 12px; border-radius: 3px; line-height: 1; }
.remove-session-btn:hover { color: var(--text-danger); background: color-mix(in srgb, var(--text-danger) 12%, transparent); }
.session-date-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; font-size: 12px; }
.session-date-row i { font-size: 13px; color: var(--text-tertiary); flex-shrink: 0; }
.date-input-field { border: 1px solid var(--border-tertiary); background: var(--bg-primary); font-size: 12px; color: var(--text-primary); font-family: var(--font-sans); padding: 3px 6px; border-radius: 4px; outline: none; color-scheme: light dark; }
.date-input-field:hover { border-color: var(--border-secondary); }
.date-input-field:focus { border-color: var(--border-primary); }
.session-day-label { font-size: 11px; font-weight: 500; color: var(--color-section-before); flex-shrink: 0; }
.session-time-row { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; font-size: 12px; }
.session-time-row i { font-size: 13px; color: var(--text-tertiary); flex-shrink: 0; }
.time-input-field { border: 1px solid var(--border-tertiary); background: var(--bg-primary); font-size: 12px; color: var(--text-primary); font-family: var(--font-sans); padding: 3px 6px; border-radius: 4px; outline: none; color-scheme: light dark; width: 82px; }
.time-input-field:hover { border-color: var(--border-secondary); }
.time-input-field:focus { border-color: var(--border-primary); }
.session-status-row { margin-top: 3px; margin-bottom: 2px; }
.session-staff { margin-top: 6px; }
.session-staff-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; font-size: 12px; color: var(--text-secondary); }
.session-staff-row i { font-size: 13px; color: var(--text-tertiary); flex-shrink: 0; }

.archive-btn { background: transparent; border: 1px solid var(--border-tertiary); color: var(--text-secondary); cursor: pointer; padding: 8px 6px; border-radius: var(--radius-md); font-size: 12px; line-height: 1; font-family: var(--font-sans); display: flex; align-items: center; justify-content: center; gap: 5px; white-space: nowrap; width: 100%; }
.archive-btn:hover { background: color-mix(in srgb, var(--color-status-done) 14%, transparent); color: var(--color-status-done); border-color: color-mix(in srgb, var(--color-status-done) 30%, transparent); }
.restore-btn:hover { background: color-mix(in srgb, var(--color-section-before) 14%, transparent); color: var(--color-section-before); border-color: color-mix(in srgb, var(--color-section-before) 30%, transparent); }
.archive-btn.del-action-btn:hover { background: color-mix(in srgb, var(--text-danger) 14%, transparent); color: var(--text-danger); border-color: color-mix(in srgb, var(--text-danger) 30%, transparent); }

.modal input, .modal select { width: 100%; padding: 9px 12px; font-size: 13px; border: 1px solid var(--border-secondary); border-radius: var(--radius-md); background: var(--bg-primary); color: var(--text-primary); font-family: var(--font-sans); outline: none; margin-bottom: 16px; }
.modal input:focus, .modal select:focus { border-color: var(--border-primary); }

.modal-actions button:hover { background: var(--bg-secondary); }

.notes-preview h1,.notes-preview h2,.notes-preview h3 { font-weight: 600; margin: 16px 0 8px; color: var(--text-primary); }

.notes-tab-btn.active { color: var(--text-primary); border-bottom-color: var(--text-primary); }
.cleanup-btn { display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; font-size: 12px; font-family: var(--font-sans); font-weight: 500; border: 1px solid var(--border-secondary); color: var(--text-secondary); background: transparent; border-radius: var(--radius-md); cursor: pointer; transition: background 0.15s, color 0.15s; }
.cleanup-btn:hover { background: color-mix(in srgb, var(--color-status-done) 12%, transparent); color: var(--color-status-done); border-color: color-mix(in srgb, var(--color-status-done) 30%, transparent); }

/* 이메일 초안 토스트 */

<body>
<div class="container">
  <h2 class="sr-only">기업별 교육 프로젝트 진행 매트릭스</h2>

  <div class="notes-section" style="margin-top: 0; margin-bottom: 28px;">
    <div class="notes-header">
      <h2><i class="ti ti-notebook"></i>업무 특이사항</h2>
      <div style="display:flex; align-items:center; gap:10px;">
        <button class="cleanup-btn" onclick="cleanupNotes()" title="취소선 항목을 업무 완료 탭으로 이동"><i class="ti ti-transfer-out"></i>정리하기</button>
        <div class="notes-meta">
          <span id="notes-count">0자</span>
          <span class="notes-divider">·</span>
          <span id="notes-updated">아직 작성된 내용 없음</span>
        </div>
      </div>
    </div>
    <div class="notes-tab-bar">
      <button class="notes-tab-btn active" id="notes-tab-btn-notes" onclick="switchNotesTab('notes')"><i class="ti ti-notes"></i>특이사항</button>
      <button class="notes-tab-btn" id="notes-tab-btn-completed" onclick="switchNotesTab('completed')"><i class="ti ti-circle-check"></i>업무 완료</button>
      <button class="notes-tab-btn" id="notes-tab-btn-preview" onclick="switchNotesTab('preview')"><i class="ti ti-eye"></i>미리보기</button>
    </div>
    <div class="notes-body" id="notes-main-pane">
      <div class="notes-editor-pane">
        <div class="notes-pane-label"><i class="ti ti-pencil"></i>편집</div>
        <textarea id="notes" class="notes-input" placeholder="업무를 진행하면서 발생한 특이사항, 메모, 아이디어를 자유롭게 작성하세요...&#10;&#10;예) - A기업 강사 일정 조율 필요 (수요일 오후 불가)&#10;    - 교안 피드백 받은 내용 정리&#10;    - 다음 분기 개선사항"></textarea>
      </div>
      <div class="notes-preview-pane">
        <div class="notes-pane-label"><i class="ti ti-eye"></i>미리보기</div>
        <div id="notes-preview" class="notes-preview"></div>
      </div>
    </div>
    <div id="notes-completed-pane" style="display:none;">
      <textarea id="completed-notes" class="notes-input" placeholder="정리하기 버튼으로 취소선 항목이 여기에 모입니다...&#10;&#10;직접 편집하거나 삭제할 수도 있습니다."></textarea>
    </div>
    <div id="notes-preview-full-pane" style="display:none;">
      <div id="notes-preview-full" class="notes-preview" style="min-height: 480px; padding: 24px 32px; font-size: 14px; line-height: 1.8;"></div>
    </div>
  </div>

  <div class="title-bar">
    <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
      <h1>교육 프로젝트 진행 현황</h1>
      <button class="sync-btn" onclick="copySyncCommand()" title="ax-hub에서 담당 교육 목록 가져오기">
        <i class="ti ti-cloud-download"></i>교육 가져오기
      </button>
    </div>
    <div style="display:flex; align-items:center; gap:14px;">
      <button class="user-badge" id="user-badge" onclick="showUserSelector()"><i class="ti ti-user"></i><span id="user-badge-name">-</span></button>
      <div class="save-indicator" id="save-indicator"><i class="ti ti-check"></i>저장됨</div>
      <div class="summary" id="summary"></div>
    </div>
  </div>

  <div class="toolbar">
    <input type="text" id="new-company" placeholder="기업명 입력 후 Enter..." />
    <button class="primary" onclick="addCompany()"><i class="ti ti-plus"></i> 기업 추가</button>
    <button onclick="openTaskModal()"><i class="ti ti-list-check"></i> 업무 추가</button>
    <div class="theme-toggle" role="group" aria-label="테마 선택">
      <button class="theme-btn" data-theme-value="light" onclick="setTheme('light')" title="라이트 모드" aria-label="라이트 모드"><i class="ti ti-sun"></i></button>
      <button class="theme-btn" data-theme-value="auto" onclick="setTheme('auto')" title="시스템 설정 따름" aria-label="시스템 설정 따름"><i class="ti ti-device-desktop"></i></button>
      <button class="theme-btn" data-theme-value="dark" onclick="setTheme('dark')" title="다크 모드" aria-label="다크 모드"><i class="ti ti-moon"></i></button>
    </div>
    <button onclick="resetData()" title="초기화"><i class="ti ti-refresh"></i></button>
  </div>

  <div class="tabs">
    <button class="tab active" id="tab-active" onclick="switchTab('active')"><i class="ti ti-progress"></i>진행 중<span class="count" id="count-active">0</span></button>
    <button class="tab" id="tab-archived" onclick="switchTab('archived')"><i class="ti ti-archive"></i>교육 완료<span class="count" id="count-archived">0</span></button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr id="head-section"></tr>
        <tr id="head-tasks"></tr>

      <tbody id="tbody"></tbody>

    <span class="legend-item"><span class="legend-dot legend-dot-1"><i class="ti ti-dots"></i></span>진행 중</span>
    <span class="legend-item"><span class="legend-dot legend-dot-2"><i class="ti ti-check"></i></span>완료</span>

  </div>

  <div id="modal-root"></div>
</div>

<script>
// ─────────────────────────────────────────────────────────────
// 테마 관리
// ─────────────────────────────────────────────────────────────
const THEME_KEY = 'training_matrix_theme';

function getTheme() {
  try {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved === 'light' || saved === 'dark' || saved === 'auto') return saved;
  } catch(e) {}
  return 'auto';
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.themeValue === theme);
  });
}

function setTheme(theme) {
  try { localStorage.setItem(THEME_KEY, theme); } catch(e) {}
  applyTheme(theme);
}

if (window.matchMedia) {
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
    if (getTheme() === 'auto') applyTheme('auto');
  });
}

// ─────────────────────────────────────────────────────────────
// 기본 데이터 및 상태
// ─────────────────────────────────────────────────────────────
// ── 사용자 관리 ────────────────────────────────────────────────
function getCurrentOwner() { return localStorage.getItem('training_owner') || ''; }
function setCurrentOwner(name) { localStorage.setItem('training_owner', name.trim()); }
function getStorageKey() { return `training_matrix_state_v1_${getCurrentOwner() || 'default'}`; }

function openUserSelectorModal(onDone) {
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-overlay">
      <div class="modal">
        <h3>누구세요?</h3>
        <label>이름을 입력하세요</label>
        <input type="text" id="owner-input" placeholder="예: 홍길동" value="${escAttr(getCurrentOwner())}" />
        <div class="modal-actions">
          <button class="primary" id="owner-confirm-btn">시작하기</button>
        </div>
      </div>
    </div>`;
  const input = document.getElementById('owner-input');
  function confirm() {
    const name = input.value.trim();
    if (!name) { input.focus(); return; }
    setCurrentOwner(name);
    root.innerHTML = '';
    if (onDone) onDone();
  }
  document.getElementById('owner-confirm-btn').addEventListener('click', confirm);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') confirm(); });
  setTimeout(() => input.focus(), 50);
}

function showUserSelector() {
  openUserSelectorModal(async () => {
    document.getElementById('user-badge-name').textContent = getCurrentOwner();
    const loaded = await loadState();
    state = loaded;
    if (typeof state.notes !== 'string') state.notes = '';
    if (state.notesUpdated === undefined) state.notesUpdated = null;
    if (typeof state.completedNotes !== 'string') state.completedNotes = '';
    if (state.completedNotesUpdated === undefined) state.completedNotesUpdated = null;
    nextCompanyId = Math.max(0, ...state.companies.map(c => c.id)) + 1;
    render();
  });
}
const DEFAULT_TASKS = [
  { id: 'before_1', label: '담당자 인계 이메일 송부', section: 'before' },
  { id: 'before_2', label: '주강사 구인', section: 'before' },
  { id: 'before_3', label: '기술튜터 구인', section: 'before' },
  { id: 'before_4', label: '교안 확인', section: 'before' },
  { id: 'before_5', label: '교안 피드백 진행', section: 'before' },
  { id: 'before_6', label: '교안 자료 이관 완료', section: 'before' },
  { id: 'before_7', label: '고객사 교안 송부', section: 'before' },
  { id: 'before_8', label: '강사·튜터 리마인더', section: 'before' },
  { id: 'after_1', label: '만족도 조사 진행', section: 'after' }
];

function DEFAULT_STATE() {
  return {
    tasks: JSON.parse(JSON.stringify(DEFAULT_TASKS)),
    companies: [
      { id: 1, name: '예시 기업 A', trainingName: 'AI 기초 과정', sessions: [{ id: 'session_1_1', date: '', startTime: '', endTime: '', instructorName: '홍길동', tutorName: '' }], trainingStatus: '세팅중', location: '', deadline: '', memo: '신입 개발자 대상 4주 과정', archived: false, status: { before_1: 2, before_2: 2, before_3: 2, before_4: 2, before_5: 1, before_6: 0, before_7: 0, before_8: 0, after_1: 0 } },

function cleanupNotes() {
  const lines = (state.notes || '').split('\n');
  const completed = [];
  const remainingLines = [];

  let currentSection = null;
  lines.forEach(line => {
    const headingMatch = line.match(/^#{1,6}\s+(.+)/);
    if (headingMatch) currentSection = headingMatch[1].trim();

    if (/^\s*(?:-\s*)?~~.+~~\s*$/.test(line)) {
      const cleaned = line.replace(/~~(.+?)~~/g, '$1').replace(/^\s*-\s*/, '- ');
      completed.push({ cleaned, section: currentSection });
    } else {
      remainingLines.push(line);
    }
  });

  if (completed.length === 0) return;

  const now = new Date();
  const stamp = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')}`;

  // 헤딩 섹션별로 그룹핑
  const groups = {};
  const noSection = [];
  completed.forEach(item => {
    if (item.section) {
      if (!groups[item.section]) groups[item.section] = [];
      groups[item.section].push(item.cleaned);
    } else {
      noSection.push(item.cleaned);
    }
  });

  const blockLines = [`[${stamp} 정리]`];
  Object.entries(groups).forEach(([label, items]) => {
    blockLines.push(`**${label}**`);
    items.forEach(l => blockLines.push(l));
  });
  if (noSection.length > 0) {
    if (Object.keys(groups).length > 0) blockLines.push('**기타**');
    noSection.forEach(l => blockLines.push(l));
  }
  const block = blockLines.join('\n');
  state.completedNotes = state.completedNotes ? state.completedNotes + '\n\n' + block : block;

  while (remainingLines.length > 0 && remainingLines[remainingLines.length - 1].trim() === '') {
    remainingLines.pop();
  }
  state.notes = remainingLines.join('\n');

  const notesTA = document.getElementById('notes');
  if (notesTA) notesTA.value = state.notes;
  const completedTA = document.getElementById('completed-notes');
  if (completedTA) completedTA.value = state.completedNotes;

  updateNotesMeta();
  updateNotesPreview();
  pushNotesHistory(state.notes);
  saveState();
  switchNotesTab('completed');
  showCopyToast(`${completed.length}개 항목이 업무 완료로 이동되었습니다`);
}

// 업무 특이사항 되돌리기 스택
let notesHistory = [];
let notesHistoryIdx = -1;
let notesHistoryTimer = null;

function initNotesHistory(value) {
  notesHistory = [value];
  notesHistoryIdx = 0;
}

function pushNotesHistory(value) {
  if (notesHistoryIdx >= 0 && notesHistory[notesHistoryIdx] === value) return;
  notesHistory = notesHistory.slice(0, notesHistoryIdx + 1);
  notesHistory.push(value);
  if (notesHistory.length > 200) { notesHistory.shift(); }
  notesHistoryIdx = notesHistory.length - 1;
}

function notesUndo() {
  if (notesHistoryIdx <= 0) return;
  notesHistoryIdx--;
  applyNotesHistoryValue(notesHistory[notesHistoryIdx]);
}

function notesRedo() {
  if (notesHistoryIdx >= notesHistory.length - 1) return;
  notesHistoryIdx++;
  applyNotesHistoryValue(notesHistory[notesHistoryIdx]);
}

function applyNotesHistoryValue(value) {
  const ta = document.getElementById('notes');
  if (!ta) return;
  ta.value = value;
  state.notes = value;
  state.notesUpdated = new Date().toISOString();
  updateNotesMeta();
  updateNotesPreview();
  saveState();
}

async function loadState() {
  try {
    const res = await fetch('/api/state?owner=' + encodeURIComponent(getCurrentOwner()));
    if (res.ok) {
      const data = await res.json();
      if (data && data.tasks && data.companies) return data;
    }
  } catch (err) {
    console.log('API 불러오기 실패, localStorage 시도:', err);
  }
  try {
    const raw = localStorage.getItem(getStorageKey());
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && parsed.tasks && parsed.companies) return parsed;
    }
  } catch (err) {
    console.log('localStorage 불러오기 실패, 기본값 사용:', err);
  }
  return DEFAULT_STATE();
}

async function persistNow() {
  const payload = state;
  let apiOk = false;

  try {
    const res = await fetch('/api/state?owner=' + encodeURIComponent(getCurrentOwner()), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    apiOk = res.ok;
  } catch (err) {
    console.warn('API 저장 실패:', err);
  }

  // localStorage에도 백업
  try { localStorage.setItem(getStorageKey(), JSON.stringify(payload)); } catch (e) {}

  if (apiOk) {
    showSaveIndicator();
  } else {
    showSaveError();
  }
}

function showSaveError() {
  const el = document.getElementById('save-indicator');
  if (!el) return;
  el.innerHTML = '<i class="ti ti-alert-triangle"></i>저장 실패';
  el.classList.add('visible', 'error');

  el._timer = setTimeout(() => {

function saveState() {

function showSaveIndicator() {

function escHtml(s) {
  return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return escHtml(s); }

function periodInfo(startStr, endStr) {
  if (!startStr && !endStr) return '';
  const fmt = (s) => {
    if (!s) return '';
    const d = new Date(s);
    if (isNaN(d)) return '';
    const y = d.getFullYear();
    const mo = String(d.getMonth() + 1).padStart(2, '0');
    const da = String(d.getDate()).padStart(2, '0');
    const h = String(d.getHours()).padStart(2, '0');
    const mi = String(d.getMinutes()).padStart(2, '0');
    return `${y}.${mo}.${da} ${h}:${mi}`;
  };
  const start = startStr ? new Date(startStr) : null;
  const end = endStr ? new Date(endStr) : null;

  if (start && end && !isNaN(start) && !isNaN(end)) {
    if (end < start) {
      return `<div class="period-summary error"><i class="ti ti-alert-triangle"></i>종료일이 시작일보다 빠릅니다</div>`;
    }
    const diffMs = end - start;
    const totalMin = Math.round(diffMs / 60000);
    const days = Math.floor(totalMin / 1440);
    const hours = Math.floor((totalMin % 1440) / 60);
    const mins = totalMin % 60;
    let durStr = '';
    if (days > 0) durStr += `${days}일`;
    if (hours > 0) durStr += (durStr ? ' ' : '') + `${hours}시간`;
    if (mins > 0 && days === 0) durStr += (durStr ? ' ' : '') + `${mins}분`;
    if (!durStr) durStr = '0분';

    const now = new Date();
    let statusLabel = '', statusCls = '';
    if (now < start) {
      statusLabel = '예정';
      statusCls = 'upcoming';
    } else if (now >= start && now <= end) {
      statusLabel = '진행 중';
      statusCls = 'ongoing';
    } else {
      statusLabel = '종료됨';
      statusCls = 'finished';
    }
    return `<div class="period-summary">
      <span class="period-duration"><i class="ti ti-clock"></i>총 ${durStr}</span>
      <span class="period-status ${statusCls}">${statusLabel}</span>
    </div>`;
  }
  if (start && !isNaN(start)) {
    return `<div class="period-summary partial">시작: ${fmt(startStr)} · 종료일 미설정</div>`;
  }
  if (end && !isNaN(end)) {
    return `<div class="period-summary partial">종료: ${fmt(endStr)} · 시작일 미설정</div>`;
  }
  return '';
}

function deadlineInfo(dateStr) {
  if (!dateStr) return { cls: '', label: '' };
  const today = new Date();
  today.setHours(0,0,0,0);
  const d = new Date(dateStr);
  if (isNaN(d)) return { cls: '', label: '' };
  d.setHours(0,0,0,0);
  const diff = Math.round((d - today) / 86400000);
  if (diff === 0) return { cls: 'dday', label: 'D-DAY' };
  if (diff < 0) return { cls: 'over', label: 'D+' + (-diff) };
  if (diff <= 3) return { cls: 'soon', label: 'D-' + diff };
  return { cls: '', label: 'D-' + diff };
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = (el.scrollHeight) + 'px';
}

const KO_DAYS = ['일', '월', '화', '수', '목', '금', '토'];
function getDayLabel(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  if (isNaN(d)) return '';
  return `(${KO_DAYS[d.getDay()]})`;
}

function sessionStatusBadge(dates, startTime, endTime) {
  if (!dates || !dates.length || !dates[0]) return '';
  const firstDate = dates[0];
  const lastDate = dates[dates.length - 1];
  const start = new Date(firstDate + 'T' + (startTime || '00:00'));
  const end = new Date(lastDate + 'T' + (endTime || '23:59'));
  if (isNaN(start)) return '';
  const now = new Date();
  let label, cls;
  if (now < start) { label = '예정'; cls = 'upcoming'; }
  else if (now >= start && now <= end) { label = '진행 중'; cls = 'ongoing'; }
  else { label = '종료됨'; cls = 'finished'; }
  return `<span class="period-status ${cls}">${label}</span>`;
}

function parseDatetimeLocal(dtStr) {
  if (!dtStr) return { date: '', time: '' };
  const [date, time] = dtStr.split('T');
  return { date: date || '', time: time ? time.slice(0, 5) : '' };
}

let _stickyCleanup = null;

function setupStickyHeader() {
  if (_stickyCleanup) { _stickyCleanup(); _stickyCleanup = null; }
  const tableWrap = document.querySelector('.table-wrap');
  if (!tableWrap) return;

  function onScroll() {
    const thead = tableWrap.querySelector('thead');
    if (!thead) return;
    const rect = tableWrap.getBoundingClientRect();
    const theadH = thead.offsetHeight;
    if (rect.top < 0 && rect.bottom > theadH) {
      thead.style.transform = `translateY(${-rect.top}px)`;
      thead.style.position = 'relative';
      thead.style.zIndex = '5';
      thead.style.boxShadow = '0 2px 8px rgba(0,0,0,0.08)';
    } else {
      thead.style.transform = '';
      thead.style.position = '';
      thead.style.zIndex = '';
      thead.style.boxShadow = '';
    }
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  _stickyCleanup = () => window.removeEventListener('scroll', onScroll);
  onScroll();
}

function saveTask(taskId) {
  const label = document.getElementById('task-label').value.trim();
  const section = document.getElementById('task-section').value;
  if (!label) return;
  if (taskId) {
    const t = state.tasks.find(t => t.id === taskId);
    if (t) { t.label = label; t.section = section; reorderTasks(); }
  } else {
    const newId = 'task_' + Date.now() + '_' + nextTaskNum++;
    state.tasks.push({ id: newId, label, section });
    state.companies.forEach(c => { if (!c.status) c.status = {}; c.status[newId] = 0; });
    reorderTasks();
  }
  closeModal();
  render();
}

function reorderTasks() {
  const before = state.tasks.filter(t => t.section === 'before');
  const after = state.tasks.filter(t => t.section === 'after');
  state.tasks = [...before, ...after];
}

function attachDragHandlers() {
  document.querySelectorAll('.task-th[draggable="true"]').forEach(th => {
    th.addEventListener('dragstart', onDragStart);
    th.addEventListener('dragover', onDragOver);
    th.addEventListener('dragleave', onDragLeave);
    th.addEventListener('drop', onDrop);
    th.addEventListener('dragend', onDragEnd);
  });
  document.querySelectorAll('.task-th .task-th-btn').forEach(btn => {
    btn.addEventListener('mousedown', e => e.stopPropagation());
    btn.addEventListener('dragstart', e => { e.preventDefault(); e.stopPropagation(); });
  });
}

function onDragStart(e) {
  if (e.target.closest('.task-th-btn')) { e.preventDefault(); return; }
  dragSrcId = this.dataset.taskId;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  try { e.dataTransfer.setData('text/plain', dragSrcId); } catch(err) {}
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (!dragSrcId || this.dataset.taskId === dragSrcId) return;
  const rect = this.getBoundingClientRect();
  const after = (e.clientX - rect.left) > rect.width / 2;
  document.querySelectorAll('.task-th').forEach(el => el.classList.remove('drop-before', 'drop-after'));
  this.classList.add(after ? 'drop-after' : 'drop-before');
}

function onDragLeave(e) {
  if (this.contains(e.relatedTarget)) return;
  this.classList.remove('drop-before', 'drop-after');
}

function onDrop(e) {
  e.preventDefault();
  e.stopPropagation();
  const targetId = this.dataset.taskId;
  if (!dragSrcId || targetId === dragSrcId) return;
  const after = this.classList.contains('drop-after');
  moveTask(dragSrcId, targetId, after);
}

function onDragEnd() {
  document.querySelectorAll('.task-th').forEach(el => el.classList.remove('dragging', 'drop-before', 'drop-after'));
  dragSrcId = null;
}

function moveTask(srcId, targetId, placeAfter) {
  const srcIdx = state.tasks.findIndex(t => t.id === srcId);
  const targetIdx = state.tasks.findIndex(t => t.id === targetId);
  if (srcIdx < 0 || targetIdx < 0) return;
  const [src] = state.tasks.splice(srcIdx, 1);
  const target = state.tasks.find(t => t.id === targetId);
  if (target) src.section = target.section;
  let insertIdx = state.tasks.findIndex(t => t.id === targetId);
  if (placeAfter) insertIdx += 1;
  state.tasks.splice(insertIdx, 0, src);
  reorderTasks();
  render();
}

function openSlackDM(companyId) {
  const c = state.companies.find(c => c.id === companyId);
  if (!c) return;
  const fmtDate = (s) => {
    if (!s) return '';
    const d = new Date(s);
    if (isNaN(d)) return '';
    const mo = String(d.getMonth() + 1).padStart(2, '0');
    const da = String(d.getDate()).padStart(2, '0');
    const h = String(d.getHours()).padStart(2, '0');
    const mi = String(d.getMinutes()).padStart(2, '0');
    return `${d.getFullYear()}.${mo}.${da} ${h}:${mi}`;
  };
  const parts = ['/tutor-onboarding', c.name];
  if (c.trainingName) parts.push(`교육명:${c.trainingName}`);
  const fmtSession = (s) => {
    if (!s.dates || !s.dates.length || !s.dates[0]) return '';
    const time = [s.startTime, s.endTime].filter(Boolean).join('~');
    const dateStr = s.dates.length === 1
      ? s.dates[0].replace(/-/g, '.')
      : s.dates[0].replace(/-/g, '.') + '~' + s.dates[s.dates.length - 1].replace(/-/g, '.');
    return dateStr + (time ? ' ' + time : '');
  };
  const sessions = c.sessions || [];
  if (sessions.length === 1) {
    const s = sessions[0];
    if (s.instructorName) parts.push(`강사:${s.instructorName}`);
    if (s.tutorName) parts.push(`튜터:${s.tutorName}`);
    const dateStr = fmtSession(s);
    if (dateStr) parts.push(`교육일자:${dateStr}`);
  } else if (sessions.length >= 2) {
    sessions.forEach((s, i) => {
      if (s.instructorName) parts.push(`강사${i + 1}:${s.instructorName}`);
      const dateStr = fmtSession(s);
      if (dateStr) parts.push(`${i + 1}회차교육일자:${dateStr}`);
    });
    const tutors = [...new Set(sessions.map(s => s.tutorName).filter(Boolean))];
    if (tutors.length) parts.push(`튜터:${tutors.join(',')}`);
  }
  if (c.location) parts.push(`장소:${c.location}`);
  if (c.workbookUrl) parts.push(`교안:${c.workbookUrl}`);
  const cmd = parts.join(' ');
  navigator.clipboard.writeText(cmd).then(() => {
    showCopyToast(cmd);
  }).catch(() => {
    prompt('아래 명령어를 복사해서 Claude Code에 붙여넣으세요:', cmd);
  });
}

    '',
    `장소: ${c.location || ''}`,
    `교육 일정:`,
    ...sessionLines,
    `구인 인원: 1인`
  ];

  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    showCopyToast('기술튜터 구인 글 복사됨 — Slack에 붙여넣기 하세요');
  }).catch(() => {
    prompt('아래 내용을 복사해서 Slack에 붙여넣으세요:', text);
  });
}

function openInstructorRecruitment(companyId) {
  const c = state.companies.find(c => c.id === companyId);
  if (!c) return;

  const DAY_LABELS = ['일', '월', '화', '수', '목', '금', '토'];

  const sessionLines = [];
  (c.sessions || []).forEach(s => {
    const dates = (s.dates && s.dates.length) ? s.dates : (s.date ? [s.date] : []);
    let durationNote = '';
    if (s.startTime && s.endTime) {
      const [sh, sm] = s.startTime.split(':').map(Number);
      const [eh, em] = s.endTime.split(':').map(Number);
      const totalMin = (eh * 60 + em) - (sh * 60 + sm);
      if (totalMin > 0) {
        const totalH = totalMin / 60;
        const netH = totalH >= 5 ? totalH - 1 : totalH;
        const netHStr = Number.isInteger(netH) ? netH : netH.toFixed(1);
        durationNote = ` (점심시간 제외 ${netHStr}시간)`;
      }
    }
    const timeStr = s.startTime && s.endTime
      ? `${s.startTime}~${s.endTime}${durationNote}`
      : [s.startTime, s.endTime].filter(Boolean).join('~');

    if (dates.length) {
      dates.forEach(dateStr => {
        if (!dateStr) return;
        const d = new Date(dateStr + 'T00:00:00');
        if (isNaN(d)) return;
        let line = `${d.getMonth() + 1}/${d.getDate()}(${DAY_LABELS[d.getDay()]})`;
        if (timeStr) line += `  /  ${timeStr}`;
        sessionLines.push(line);
      });
    } else if (timeStr) {
      sessionLines.push(timeStr);
    }
  });

  const lines = [
    `@channel [${c.name}] ${c.trainingName || '교육 과정'}`,
    '하기 일정과 내용으로 교육 가능한 강사님들의 많은 지원 부탁드립니다.',
    '',
    '일정',
    ...sessionLines,
    c.trainingName || '',
    '',
    '',
    `장소 : ${c.location || ''}`,
    '커리큘럼 : 첨부파일 참고 (일부 변경될 가능성이 있습니다.)'
  ];

  const text = lines.join('\n');
  navigator.clipboard.writeText(text).then(() => {
    showCopyToast('주강사 구인 글 복사됨 — Slack에 붙여넣기 하세요');
  }).catch(() => {
    prompt('아래 내용을 복사해서 Slack에 붙여넣으세요:', text);
  });
}

function openEmailDraft(companyId) {
  const c = state.companies.find(c => c.id === companyId);
  if (!c) return;

  const fmtDate = (s) => {
    if (!s) return '';
    const d = new Date(s);
    if (isNaN(d)) return s;
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  };

  const parts = [`/email-draft ${c.name}`];
  if (c.trainingName) parts.push(`교육명: ${c.trainingName}`);
  const start = fmtDate(c.startAt), end = fmtDate(c.endAt);
  if (start || end) parts.push(`교육일자: ${start}${start && end ? ' ~ ' : ''}${end}`);
  if (c.location) parts.push(`장소: ${c.location}`);
  if (c.contactEmail) parts.push(`담당자이메일: ${c.contactEmail}`);

  const cmd = parts.join(' / ');
  navigator.clipboard.writeText(cmd).then(() => {
    showCopyToast(cmd);
  }).catch(() => {
    prompt('아래 명령어를 복사해서 Claude Code에 붙여넣으세요:', cmd);
  });
}

function showCopyToast(cmd) {
  let toast = document.getElementById('copy-toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'copy-toast';
    toast.className = 'copy-toast';
    document.body.appendChild(toast);
  }
  toast.innerHTML = `<i class="ti ti-clipboard-check"></i>복사됨 — Claude Code에 붙여넣기 하세요 <code>${escHtml(cmd)}</code>`;
  toast.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('visible'), 3000);
}

document.getElementById('new-company').addEventListener('keydown', e => {

document.getElementById('completed-notes').addEventListener('input', e => {

  saveState();

document.getElementById('notes').addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const ta = e.target;
    const start = ta.selectionStart;
    const end = ta.selectionEnd;
    if (!e.shiftKey) {
      ta.value = ta.value.slice(0, start) + '  ' + ta.value.slice(end);
      ta.selectionStart = ta.selectionEnd = start + 2;
    } else {
      const lineStart = ta.value.lastIndexOf('\n', start - 1) + 1;
      const line = ta.value.slice(lineStart, end);
      if (line.startsWith('  ')) {
        ta.value = ta.value.slice(0, lineStart) + line.slice(2) + ta.value.slice(lineStart + line.length);
        ta.selectionStart = ta.selectionEnd = Math.max(lineStart, start - 2);
      }
    }
    ta.dispatchEvent(new Event('input'));
    return;
  }
  if (e.key === 'Enter' && !e.ctrlKey && !e.shiftKey && !e.altKey) {
    const ta = e.target;
    const pos = ta.selectionStart;
    const lineStart = ta.value.lastIndexOf('\n', pos - 1) + 1;
    const currentLine = ta.value.slice(lineStart, pos);
    const match = currentLine.match(/^(\s*-\s)/);
    if (match) {
      e.preventDefault();
      const prefix = match[1];
      const before = ta.value.slice(0, pos);
      const after = ta.value.slice(ta.selectionEnd);
      // 현재 줄이 "- " 만 있으면 리스트 종료
      if (currentLine.trim() === '-') {
        ta.value = ta.value.slice(0, lineStart) + '' + after;
        ta.selectionStart = ta.selectionEnd = lineStart;
      } else {
        ta.value = before + '\n' + prefix + after;
        ta.selectionStart = ta.selectionEnd = pos + 1 + prefix.length;
      }
      ta.dispatchEvent(new Event('input'));
    }
    return;
  }
  if (e.ctrlKey && !e.shiftKey && (e.key === 'z' || e.key === 'Z')) {
    e.preventDefault();
    if (notesHistoryTimer) { clearTimeout(notesHistoryTimer); pushNotesHistory(state.notes); notesHistoryTimer = null; }
    notesUndo();
    return;
  }
  if ((e.ctrlKey && !e.shiftKey && (e.key === 'y' || e.key === 'Y')) || (e.ctrlKey && e.shiftKey && (e.key === 'z' || e.key === 'Z'))) {
    e.preventDefault();
    notesRedo();
    return;
  }
  if (e.ctrlKey && e.shiftKey && e.key === 'X') {
    e.preventDefault();
    const ta = e.target;
    const start = ta.selectionStart;
    const end = ta.selectionEnd;
    const selected = ta.value.slice(start, end);
    const before = ta.value.slice(0, start);
    const after = ta.value.slice(end);
    ta.value = before + '~~' + selected + '~~' + after;
    if (selected.length === 0) {
      ta.selectionStart = ta.selectionEnd = start + 2;
    } else {
      ta.selectionStart = start;
      ta.selectionEnd = end + 4;
    }
    ta.dispatchEvent(new Event('input'));
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

(async function init() {
  applyTheme(getTheme());
  if (!getCurrentOwner()) {
    await new Promise(resolve => openUserSelectorModal(resolve));
  }
  document.getElementById('user-badge-name').textContent = getCurrentOwner();
  try {
    const loaded = await loadState();
    state = loaded;
    if (typeof state.notes !== 'string') state.notes = '';
    if (state.notesUpdated === undefined) state.notesUpdated = null;
    if (typeof state.completedNotes !== 'string') state.completedNotes = '';
    if (state.completedNotesUpdated === undefined) state.completedNotesUpdated = null;
    nextCompanyId = Math.max(0, ...state.companies.map(c => c.id)) + 1;
    // 기존 데이터 마이그레이션
    state.companies.forEach(c => {
      if (!c.sessions) {
        // 구형 flat 구조 → sessions
        const { date: sd, time: st } = parseDatetimeLocal(c.startAt || '');
        const { time: et } = parseDatetimeLocal(c.endAt || '');
        c.sessions = [{ id: 'session_' + c.id + '_1', dates: sd ? [sd] : [], startTime: st, endTime: et, instructorName: c.instructorName || '', tutorName: c.tutorName || '' }];
        delete c.startAt; delete c.endAt; delete c.instructorName; delete c.tutorName;
      } else {
        c.sessions.forEach(s => {
          // startAt/endAt 형식 변환
          if (s.startAt !== undefined || s.endAt !== undefined) {
            const { date: sd, time: st } = parseDatetimeLocal(s.startAt || '');
            const { time: et } = parseDatetimeLocal(s.endAt || '');
            if (!s.dates) s.dates = sd ? [sd] : [];
            s.startTime = s.startTime || st;
            s.endTime = s.endTime || et;
            delete s.startAt; delete s.endAt;
          }
          // 구형 date 단일 필드 → dates 배열로 변환
          if (s.dates === undefined) {
            s.dates = s.date ? [s.date] : [];
            delete s.date;
          }
        });
      }
    });
  } catch (err) {
    console.error('초기 로드 실패:', err);
  }
  initNotesHistory(state.notes || '');
  render();
})();
</script>
